name: CI

permissions:
    contents: read
on:
    pull_request:
        branches: [master, dev]

# Actions are pinned to full commit SHAs (F-792) to match docker-compose's
# digest-pinning posture; the trailing comment records the human version.
# Dependabot's github-actions group updates the SHA pins weekly.
# pnpm is bootstrapped via pnpm/action-setup (reads packageManager from
# package.json) + setup-node cache:pnpm — one mechanism across all workflows
# (F-787). Do not reintroduce the hardcoded `npm install -g pnpm@x` bootstrap.

jobs:
    Prettier-check:
        name: Prettier Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prettier Check
              run: pnpm run prettier-check

    Test:
        name: Run Tests and Coverage
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run all package unit suites # F-163 / F-502 — every package, not just react
              run: pnpm run test # after P1 === `turbo run test --continue`

            - name: Coverage floors (all 9 publishable packages) # F-162 / F-503 — per-package anti-regression ratchets in each vitest.config.ts; turbo --continue so one package cannot mask the rest (F-790: routed through turbo so preact/vanilla see fresh dist)
              run: pnpm run test:coverage

            - name: Env schema drift
              run: pnpm run env:check

            - name: Retired-vocabulary census # naming sweeps must land in EVERY layer (identifiers, DOM strings, fixtures) — see scripts/check-retired-vocab.mjs
              run: pnpm run vocab:check

            - name: Archive code coverage results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: code-coverage-report
                  path: coverage/
                  retention-days: 30

    Build:
        name: Build project
        runs-on: ubuntu-latest
        needs: [Prettier-check, Test]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

    Typecheck:
        name: Typecheck project
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm run typecheck

    Bundle-Size:
        name: Bundle size check
        runs-on: ubuntu-latest
        needs: [Build]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Size limit
              run: pnpm run size

    Dependency-Audit:
        name: Dependency audit (packages/*, production scope)
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prod dependency audit (publishable packages, fail on high+)
              run: pnpm run audit:prod

    Lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint

    Oxlint:
        name: Oxlint (fast lint)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Oxlint
              run: pnpm run lint:ox

    Knip:
        name: Knip (dead code)
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Knip
              run: pnpm run knip

    Status-Check:
        name: Status Check
        runs-on: ubuntu-latest
        needs:
            [
                Prettier-check,
                Oxlint,
                Test,
                Build,
                Typecheck,
                Bundle-Size,
                Dependency-Audit,
                Lint,
                Knip,
            ]
        if: always()
        steps:
            - name: Check status
              run: |
                  if [ "${{ needs.Prettier-check.result }}" != "success" ] || \
                     [ "${{ needs.Oxlint.result }}" != "success" ] || \
                     [ "${{ needs.Test.result }}" != "success" ] || \
                     [ "${{ needs.Build.result }}" != "success" ] || \
                     [ "${{ needs.Typecheck.result }}" != "success" ] || \
                     [ "${{ needs.Bundle-Size.result }}" != "success" ] || \
                     [ "${{ needs.Dependency-Audit.result }}" != "success" ] || \
                     [ "${{ needs.Lint.result }}" != "success" ] || \
                     [ "${{ needs.Knip.result }}" != "success" ]; then
                    echo "One or more jobs failed"
                    exit 1
                  fi
                  echo "All jobs passed successfully"
