name: CI

permissions:
    contents: read
on:
    pull_request:
        branches: [master, dev]
    workflow_dispatch:

# Actions are pinned to full commit SHAs (F-792) to match docker-compose's
# digest-pinning posture; the trailing comment records the human version.
# Dependabot's github-actions group updates the SHA pins weekly.
# pnpm is bootstrapped via pnpm/action-setup (reads packageManager from
# package.json) + setup-node cache:pnpm — one mechanism across all workflows
# (F-787). Do not reintroduce the hardcoded `npm install -g pnpm@x` bootstrap.

jobs:
    Prettier-check:
        name: Prettier Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prettier Check
              run: pnpm run prettier-check

    Test:
        name: Run Tests and Coverage
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Test-quality guard # committed .only, silent skips, vague names, unjustified sleeps, integration-layer mocks, regen-guard presence
              run: pnpm run test:quality

            - name: Script self-tests (quality guard, affected resolver, tarball lib)
              run: pnpm run test:scripts

            - name: Run all package unit suites # F-163 / F-502 — every package, not just react
              run: pnpm run test # after P1 === `turbo run test --continue`

            - name: Coverage floors (all 9 publishable packages) # F-162 / F-503 — per-package anti-regression ratchets in each vitest.config.ts; turbo --continue so one package cannot mask the rest (F-790: routed through turbo so preact/vanilla see fresh dist)
              run: pnpm run test:coverage

            - name: Env schema drift
              run: pnpm run env:check

            - name: Retired-vocabulary census # naming sweeps must land in EVERY layer (identifiers, DOM strings, fixtures) — see scripts/check-retired-vocab.mjs
              run: pnpm run vocab:check

            - name: Archive code coverage results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: code-coverage-report
                  path: coverage/
                  retention-days: 30

    Build:
        name: Build project
        runs-on: ubuntu-latest
        needs: [Prettier-check, Test]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build
              env:
                  MINIO_ROOT_USER: upupadmin
                  MINIO_ROOT_PASSWORD: upupadmin123
                  UPUP_UPLOAD_TOKEN_SECRET: upup-e2e-upload-token-secret-dev-only
                  UPUP_E2E_BUCKET: upup-e2e
                  UPUP_E2E_REGION: us-east-1
                  UPUP_E2E_ENDPOINT: http://localhost:9100

    Typecheck:
        name: Typecheck project
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm run typecheck

    Bundle-Size:
        name: Bundle size check
        runs-on: ubuntu-latest
        needs: [Build]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build
              env:
                  MINIO_ROOT_USER: upupadmin
                  MINIO_ROOT_PASSWORD: upupadmin123
                  UPUP_UPLOAD_TOKEN_SECRET: upup-e2e-upload-token-secret-dev-only
                  UPUP_E2E_BUCKET: upup-e2e
                  UPUP_E2E_REGION: us-east-1
                  UPUP_E2E_ENDPOINT: http://localhost:9100

            - name: Size limit
              run: pnpm run size

    Dependency-Audit:
        name: Dependency audit (packages/*, production scope)
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prod dependency audit (publishable packages, fail on high+)
              run: pnpm run audit:prod

    Lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint

    Oxlint:
        name: Oxlint (fast lint)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Oxlint
              run: pnpm run lint:ox

    Knip:
        name: Knip (dead code)
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Knip
              run: pnpm run knip

    Status-Check:
        name: Status Check
        runs-on: ubuntu-latest
        needs:
            [
                Prettier-check,
                Oxlint,
                Test,
                Build,
                Typecheck,
                Bundle-Size,
                Dependency-Audit,
                Lint,
                Knip,
            ]
        if: always()
        steps:
            - name: Check status
              run: |
                  if [ "${{ needs.Prettier-check.result }}" != "success" ] || \
                     [ "${{ needs.Oxlint.result }}" != "success" ] || \
                     [ "${{ needs.Test.result }}" != "success" ] || \
                     [ "${{ needs.Build.result }}" != "success" ] || \
                     [ "${{ needs.Typecheck.result }}" != "success" ] || \
                     [ "${{ needs.Bundle-Size.result }}" != "success" ] || \
                     [ "${{ needs.Dependency-Audit.result }}" != "success" ] || \
                     [ "${{ needs.Lint.result }}" != "success" ] || \
                     [ "${{ needs.Knip.result }}" != "success" ]; then
                    echo "One or more jobs failed"
                    exit 1
                  fi
                  echo "All jobs passed successfully"
