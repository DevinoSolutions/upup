name: CI

permissions:
    contents: read
on:
    pull_request:
        branches: [master, dev]

jobs:
    Prettier-check:
        name: Prettier Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store

            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prettier Check
              run: pnpm run prettier-check

    Test:
        name: Run Tests and Coverage
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store

            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run all package unit suites # F-163 / F-502 — every package, not just react
              run: pnpm run test # after P1 === `turbo run test --continue`

            - name: Coverage floors (all 9 publishable packages) # F-162 / F-503 — floors live in each vitest.config.ts; --no-bail so one package cannot mask the rest
              run: pnpm run test:coverage

            - name: Env schema drift
              run: pnpm run env:check

            - name: Retired-vocabulary census # naming sweeps must land in EVERY layer (identifiers, DOM strings, fixtures) — see scripts/check-retired-vocab.mjs
              run: pnpm run vocab:check

            - name: Archive code coverage results
              uses: actions/upload-artifact@v4
              with:
                  name: code-coverage-report
                  path: coverage/
                  retention-days: 30

    Build:
        name: Build project
        runs-on: ubuntu-latest
        needs: [Prettier-check, Test]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store

            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

    Typecheck:
        name: Typecheck project
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store

            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm run typecheck

    Bundle-Size:
        name: Bundle size check
        runs-on: ubuntu-latest
        needs: [Build]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store

            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Size limit
              run: pnpm run size

    Dependency-Audit:
        name: Dependency audit (packages/*, production scope)
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store
            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Prod dependency audit (publishable packages, fail on high+)
              run: pnpm run audit:prod

    Lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store
            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Lint
              run: pnpm run lint

    Oxlint:
        name: Oxlint (fast lint)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store
            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Oxlint
              run: pnpm run lint:ox

    Knip:
        name: Knip (dead code)
        runs-on: ubuntu-latest
        needs: [Prettier-check]
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - name: Setup PNPM environment
              run: |
                  npm install -g pnpm@10.11.0
                  pnpm config set store-dir ~/.pnpm-store
            - name: Cache PNPM dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-v3-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v3-
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Knip
              run: pnpm run knip

    Status-Check:
        name: Status Check
        runs-on: ubuntu-latest
        needs:
            [
                Prettier-check,
                Oxlint,
                Test,
                Build,
                Typecheck,
                Bundle-Size,
                Dependency-Audit,
                Lint,
                Knip,
            ]
        if: always()
        steps:
            - name: Check status
              run: |
                  if [ "${{ needs.Prettier-check.result }}" != "success" ] || \
                     [ "${{ needs.Oxlint.result }}" != "success" ] || \
                     [ "${{ needs.Test.result }}" != "success" ] || \
                     [ "${{ needs.Build.result }}" != "success" ] || \
                     [ "${{ needs.Typecheck.result }}" != "success" ] || \
                     [ "${{ needs.Bundle-Size.result }}" != "success" ] || \
                     [ "${{ needs.Dependency-Audit.result }}" != "success" ] || \
                     [ "${{ needs.Lint.result }}" != "success" ] || \
                     [ "${{ needs.Knip.result }}" != "success" ]; then
                    echo "One or more jobs failed"
                    exit 1
                  fi
                  echo "All jobs passed successfully"
