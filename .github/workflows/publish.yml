name: Publish
on:
  push:
    branches:
      - master
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        if: github.ref == 'refs/heads/master'
        id: changesets
        uses: changesets/action@v1
        with:
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check which package versions still need publishing
        if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false'
        id: package_meta
        shell: bash
        run: |
          PKGS=(react server core svelte vanilla angular preact next vue)
          TO_PUBLISH=""
          for p in "${PKGS[@]}"; do
            NAME=$(node -p "require('./packages/$p/package.json').name")
            VERSION=$(node -p "require('./packages/$p/package.json').version")
            npm view "$NAME@$VERSION" version >/dev/null 2>&1 || TO_PUBLISH="$TO_PUBLISH $NAME@$VERSION"
          done
          TO_PUBLISH=$(echo $TO_PUBLISH | xargs)
          echo "to_publish=$TO_PUBLISH" >> "$GITHUB_OUTPUT"
          [ -n "$TO_PUBLISH" ] && echo "any_needs_publish=true" >> "$GITHUB_OUTPUT" || echo "any_needs_publish=false" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
        run: pnpm run release

      - name: Dry-run release on dev
        if: github.ref == 'refs/heads/dev'
        run: pnpm run test-release

      - name: Create GitHub Releases (per published package)
        if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for ref in ${{ steps.package_meta.outputs.to_publish }}; do
            gh release create "$ref" --title "$ref" --generate-notes || true
          done
