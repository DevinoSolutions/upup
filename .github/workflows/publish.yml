name: Publish
on:
    push:
        branches:
            - master
            - dev

# Actions pinned to full commit SHAs (F-792); pnpm via pnpm/action-setup +
# setup-node cache:pnpm (F-787) — same mechanism as main.yml / e2e.yml.

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Upgrade npm for trusted publishing
              run: npm install -g npm@11.5.1

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Create Release Pull Request
              if: github.ref == 'refs/heads/master'
              id: changesets
              uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
              with:
                  createGithubReleases: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Check which package versions still need publishing
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false'
              id: package_meta
              shell: bash
              run: |
                  # F-781: derive the publishable set at runtime (the audit-prod.mjs
                  # predicate: @useupup/* workspace packages that are not private) instead of
                  # a hand-maintained PKGS=(react server core ...) array that silently
                  # under-scopes the publish gate when a package is added/removed.
                  TO_PUBLISH=""
                  while IFS= read -r ref; do
                    npm view "$ref" version >/dev/null 2>&1 || TO_PUBLISH="$TO_PUBLISH $ref"
                  done < <(pnpm -r ls --depth -1 --json | jq -r '.[] | select(.name | startswith("@useupup/")) | select(.private != true) | "\(.name)@\(.version)"')
                  TO_PUBLISH=$(echo $TO_PUBLISH | xargs)
                  echo "to_publish=$TO_PUBLISH" >> "$GITHUB_OUTPUT"
                  [ -n "$TO_PUBLISH" ] && echo "any_needs_publish=true" >> "$GITHUB_OUTPUT" || echo "any_needs_publish=false" >> "$GITHUB_OUTPUT"

            # ── Pre-publish gate (F-791) ──────────────────────────────────────────
            # Publishing from master implies its PR passed main.yml/e2e.yml, but a
            # direct push (or unset branch protection) would publish a commit those
            # gates never ran on. So the fast static gates that main.yml runs on PRs
            # are re-run here on the exact commit being published: prettier, lint,
            # env:check, vocab:check, audit:prod (all seconds-fast) alongside the
            # existing typecheck/test/build/size/smoke. e2e is deliberately NOT here:
            # it needs a MinIO service + Playwright browsers (minutes) and gates PRs
            # in e2e.yml; publishing from master trusts that PR gate. Branch
            # protection must require both rollups (see CLAUDE.md CI section).
            - name: Prettier check
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run prettier-check

            - name: Lint
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run lint

            - name: Env schema drift
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run env:check

            - name: Retired-vocabulary census
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run vocab:check

            - name: Prod dependency audit (publishable packages, fail on high+)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run audit:prod

            - name: Typecheck (all packages)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run typecheck

            - name: Unit suites (all packages)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run test

            - name: Build (turbo)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run build

            - name: Bundle-size budgets
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run size

            - name: Package smoke (real tarball consumer)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run smoke:packages

            - name: Publish to npm
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run release

            - name: Dry-run release on dev
              if: github.ref == 'refs/heads/dev'
              run: pnpm run test-release

            - name: Create GitHub Releases (per published package)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TO_PUBLISH: ${{ steps.package_meta.outputs.to_publish }}
              run: |
                  for ref in $TO_PUBLISH; do
                    case "$ref" in *[!A-Za-z0-9@._/-]*) echo "skip invalid ref: $ref"; continue;; esac
                    gh release create "$ref" --title "$ref" --generate-notes || true
                  done
