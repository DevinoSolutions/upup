name: Publish
on:
    push:
        branches:
            - master
            - dev

# Actions pinned to full commit SHAs (F-792); pnpm via pnpm/action-setup +
# setup-node cache:pnpm (F-787) — same mechanism as main.yml / e2e.yml.

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  # Full history + tags: the umbrella-release step derives contributors
                  # (git shortlog over the range) and the previous v-tag from them.
                  fetch-depth: 0

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0

            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Upgrade npm for trusted publishing
              run: npm install -g npm@11.16.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Create Release Pull Request
              if: github.ref == 'refs/heads/master'
              id: changesets
              uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
              with:
                  createGithubReleases: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Check which package versions still need publishing
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false'
              id: package_meta
              shell: bash
              run: |
                  # F-781: derive the publishable set at runtime (the audit-prod.mjs
                  # predicate: @upupjs/* workspace packages that are not private) instead of
                  # a hand-maintained PKGS=(react server core ...) array that silently
                  # under-scopes the publish gate when a package is added/removed.
                  TO_PUBLISH=""
                  while IFS= read -r ref; do
                    npm view "$ref" version >/dev/null 2>&1 || TO_PUBLISH="$TO_PUBLISH $ref"
                  done < <(pnpm -r ls --depth -1 --json | jq -r '.[] | select(.name | startswith("@upupjs/")) | select(.private != true) | "\(.name)@\(.version)"')
                  TO_PUBLISH=$(echo $TO_PUBLISH | xargs)
                  echo "to_publish=$TO_PUBLISH" >> "$GITHUB_OUTPUT"
                  [ -n "$TO_PUBLISH" ] && echo "any_needs_publish=true" >> "$GITHUB_OUTPUT" || echo "any_needs_publish=false" >> "$GITHUB_OUTPUT"

            # ── Pre-publish gate (F-791) ──────────────────────────────────────────
            # Publishing from master implies its PR passed main.yml/e2e.yml, but a
            # direct push (or unset branch protection) would publish a commit those
            # gates never ran on. So the fast static gates that main.yml runs on PRs
            # are re-run here on the exact commit being published: prettier, lint,
            # env:check, vocab:check, audit:prod (all seconds-fast) alongside the
            # existing typecheck/test/build/size/smoke. e2e is deliberately NOT here:
            # it needs a MinIO service + Playwright browsers (minutes) and gates PRs
            # in e2e.yml; publishing from master trusts that PR gate. Branch
            # protection must require both rollups (see CLAUDE.md CI section).
            - name: Prettier check
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run prettier-check

            - name: Lint
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run lint

            - name: Env schema drift
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run env:check

            - name: Retired-vocabulary census
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run vocab:check

            - name: Prod dependency audit (publishable packages, fail on high+)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run audit:prod

            - name: Typecheck (all packages)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run typecheck

            - name: Unit suites (all packages)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run test

            - name: Build (turbo)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run build

            - name: Bundle-size budgets
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run size

            - name: Package smoke (real tarball consumer)
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run smoke:packages

            # Auth: all nine @upupjs packages now exist on npm (first published
            # 2026-07-13), so OIDC trusted publishing is the intended path. Configure
            # a trusted publisher per package on npmjs.com (repo DevinoSolutions/upup,
            # workflow publish.yml); then with id-token:write (above) + Node >=22.14 +
            # npm >=11.5.1, `pnpm publish` exchanges the GitHub OIDC token automatically
            # and no registry secret is needed. NODE_AUTH_TOKEN (NPM_TOKEN secret) stays
            # as a fallback until every package has its trusted publisher configured —
            # once OIDC is verified in a real release, the secret and the env below can
            # be dropped. OIDC requires Node >=22.14, so this publish-scoped setup-node
            # pins 22.14 (the gate steps above ran on .nvmrc / Node 20). registry-url is
            # scoped here so install/gate steps never see a token-referencing .npmrc.
            - name: Set up Node 22 + npm registry for OIDC/token publish
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: '22.14.0'
                  registry-url: 'https://registry.npmjs.org'

            - name: Publish to npm
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              run: pnpm run release
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Dry-run release on dev
              if: github.ref == 'refs/heads/dev'
              run: pnpm run test-release

            - name: Push package tags + publish umbrella GitHub Release
              if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.any_needs_publish == 'true'
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # changeset publish tagged each package locally (@upupjs/x@ver) — push them
                  # so the per-package tags exist on the remote (but no per-package *releases*).
                  git push origin --tags || echo "::warning::pushing package tags failed"

                  VERSION="$(node -p "require('./packages/core/package.json').version")"
                  TAG="v$VERSION"
                  if gh release view "$TAG" >/dev/null 2>&1; then
                    echo "Release $TAG already exists — nothing to do."
                    exit 0
                  fi

                  # Previous v-release → compare link + GitHub's auto "What's Changed" body.
                  PREV_TAG="$(git tag -l 'v*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)"
                  NOTES="$RUNNER_TEMP/release-notes.md"
                  CHANGELOG="$RUNNER_TEMP/changelog.md"
                  : >"$CHANGELOG"
                  if [ -n "$PREV_TAG" ]; then
                    gh api --method POST "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
                      -f tag_name="$TAG" -f previous_tag_name="$PREV_TAG" -f target_commitish="$GITHUB_SHA" \
                      --jq '.body' >"$CHANGELOG" || : >"$CHANGELOG"
                  fi

                  NOTE_ARGS=(--version "$VERSION" --changelog "$CHANGELOG")
                  if [ -n "$PREV_TAG" ]; then NOTE_ARGS+=(--previous-tag "$PREV_TAG"); fi
                  node scripts/generate-release-notes.mjs "${NOTE_ARGS[@]}" >"$NOTES"

                  gh release create "$TAG" \
                    --title "upup $TAG" \
                    --notes-file "$NOTES" \
                    --target "$GITHUB_SHA" \
                    --latest
