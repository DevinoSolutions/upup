name: Publish
on:
  push:
    branches:
      - master
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        if: github.ref == 'refs/heads/master'
        id: changesets
        uses: changesets/action@v1
        with:
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if current package versions still need publishing
        if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false'
        id: package_meta
        shell: bash
        run: |
          # React package (always published)
          REACT_NAME=$(node -p "require('./packages/react/package.json').name")
          REACT_VERSION=$(node -p "require('./packages/react/package.json').version")
          echo "react_name=$REACT_NAME" >> "$GITHUB_OUTPUT"
          echo "react_version=$REACT_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$REACT_NAME@$REACT_VERSION" version >/dev/null 2>&1; then
            echo "react_needs_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "react_needs_publish=true" >> "$GITHUB_OUTPUT"
          fi
          # Server package (Server Mode, v2.2+)
          SERVER_NAME=$(node -p "require('./packages/server/package.json').name")
          SERVER_VERSION=$(node -p "require('./packages/server/package.json').version")
          echo "server_name=$SERVER_NAME" >> "$GITHUB_OUTPUT"
          echo "server_version=$SERVER_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$SERVER_NAME@$SERVER_VERSION" version >/dev/null 2>&1; then
            echo "server_needs_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "server_needs_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && (steps.package_meta.outputs.react_needs_publish == 'true' || steps.package_meta.outputs.server_needs_publish == 'true')
        run: pnpm run release

      - name: Dry-run release on dev
        if: github.ref == 'refs/heads/dev'
        run: pnpm run test-release

      - name: Create GitHub Release (react package)
        if: github.ref == 'refs/heads/master' && steps.changesets.outputs.hasChangesets == 'false' && steps.package_meta.outputs.react_needs_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package_meta.outputs.react_name }}@${{ steps.package_meta.outputs.react_version }}
          name: ${{ steps.package_meta.outputs.react_name }}@${{ steps.package_meta.outputs.react_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
