# upup v2 E2E XPath / Selector Registry
# Generated from Chrome DevTools snapshots
# Use these selectors for automated testing

# =============================================================================
# NAVIGATION
# =============================================================================
navigation:
  container: "[data-testid='main-nav']"
  links:
    basic: "a[data-testid='nav-basic']"
    headless: "a[data-testid='nav-headless']"
    theme: "a[data-testid='nav-theme']"
    i18n: "a[data-testid='nav-i18n']"
    files: "a[data-testid='nav-files']"
    upload: "a[data-testid='nav-upload']"
    prop_getters: "a[data-testid='nav-prop-getters']"
    plugins: "a[data-testid='nav-plugins']"
    a11y: "a[data-testid='nav-a11y']"
    sources: "a[data-testid='nav-sources']"
    theme_provider: "a[data-testid='nav-theme-provider']"
    restrictions: "a[data-testid='nav-restrictions']"

# =============================================================================
# UPUP COMPONENT SELECTORS (from rendered DOM)
# =============================================================================
upup_component:
  # Root container
  root: "[data-upup-slot='uploader.root']"
  root_data_theme: "[data-theme]"
  root_data_state: "[data-state]"
  root_lang: "[lang]"
  root_dir: "[dir]"

  # Drop zone
  dropzone:
    region: "[role='region'][aria-label]"
    aria_dropeffect: "[aria-dropeffect]"
    slot: "[data-upup-slot='dropzone.root']"

  # Source selector
  source_selector:
    slot: "[data-upup-slot='sourceSelector.root']"
    browse_button: "[data-upup-slot='sourceSelector.browseButton']"
    adapter_buttons: "[data-upup-slot='sourceSelector.adapterButton']"

  # File list
  file_list:
    container: "[role='list'][aria-live='polite']"
    items: "[role='listitem']"
    slot: "[data-upup-slot='fileList.root']"
    upload_button: "[data-upup-slot='fileList.uploadButton']"
    done_button: "[data-upup-slot='fileList.doneButton']"

  # Progress bar
  progress_bar:
    role: "[role='progressbar']"
    aria_valuenow: "[aria-valuenow]"
    aria_valuemin: "[aria-valuemin='0']"
    aria_valuemax: "[aria-valuemax='100']"

  # File preview
  file_preview:
    slot: "[data-upup-slot='filePreview.root']"
    delete_button: "[data-upup-slot='filePreview.deleteButton']"

  # Header
  header:
    slot: "[data-upup-slot='header.root']"
    remove_all: "[data-upup-slot='header.removeAllButton']"
    add_more: "[data-upup-slot='header.addMoreButton']"
    file_count: "[data-upup-slot='header.fileCount']"

# =============================================================================
# PAGE 01: BASIC UPLOADER
# =============================================================================
page_basic:
  title: "h1[data-testid='basic-title']"
  mini_toggle: "button[data-testid='basic-mini-toggle']"
  file_count: "[data-testid='basic-file-count']"
  status: "[data-testid='basic-status']"
  progress: "[data-testid='basic-progress']"
  mini_state: "[data-testid='basic-mini-state']"
  event_log: "[data-testid='basic-event-log']"
  uploader: "[data-testid='basic-uploader']"

# =============================================================================
# PAGE 02: HEADLESS HOOK
# =============================================================================
page_headless:
  title: "h1[data-testid='headless-title']"
  file_input: "input[data-testid='headless-file-input']"
  buttons:
    upload: "button[data-testid='headless-btn-upload']"
    pause: "button[data-testid='headless-btn-pause']"
    resume: "button[data-testid='headless-btn-resume']"
    cancel: "button[data-testid='headless-btn-cancel']"
    retry: "button[data-testid='headless-btn-retry']"
    remove_all: "button[data-testid='headless-btn-remove-all']"
    reverse_order: "button[data-testid='headless-btn-reverse']"
  status: "[data-testid='headless-status']"
  progress: "[data-testid='headless-progress']"
  error: "[data-testid='headless-error']"
  file_count: "[data-testid='headless-file-count']"
  file_list: "[data-testid='headless-file-list']"
  ext_keys: "[data-testid='headless-ext-keys']"
  core_options: "[data-testid='headless-core-options']"
  prop_getters:
    dropzone: "[data-testid='headless-propgetter-dropzone']"
    root: "[data-testid='headless-propgetter-root']"
    input: "[data-testid='headless-propgetter-input']"
  event_log: "[data-testid='headless-event-log']"

